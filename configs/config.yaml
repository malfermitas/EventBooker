app:
  name: "eventbooker"
  env: "dev"
  http:
    addr: ":8080"
    read_timeout_seconds: 10
    write_timeout_seconds: 10
    idle_timeout_seconds: 30
    shutdown_timeout_seconds: 10
  postgres:
    dsn: "postgres://postgres:postgres@localhost:5432/eventbooker?sslmode=disable"
    max_pool_size: 10
    conn_attempts: 5
  logger:
    engine: "slog"
    level: "info"
  transaction:
    max_attempts: 3
    base_retry_delay_ms: 10
    max_retry_delay_ms: 100
